<!DOCTYPE html>
<html>
<body>

<script>

const downloadImage = new Promise((resolve, reject) => {
    let success = true;

    setTimeout(() => {
        if (success) {
            resolve("Image downloaded: https://example.com/image.jpg");
        } else {
            reject("Download failed!");
        }
    }, 2000);
});

downloadImage
    .then(result => console.log(result))
    .catch(error => console.log(error));

</script>

</body>
</html>

<html>
<body>
<script>
function login() {
    return new Promise(resolve => {
        setTimeout(() => resolve("User logged in"), 1000);
    });
}

function getProfile() {
    return new Promise((resolve, reject) => {
        const error = true; 
        setTimeout(() => {
            if (!error) resolve("Profile data loaded");
            else reject("Failed to fetch profile");
        }, 1000);
    });
}


login()
    .then(msg => {
        console.log(msg); 
        return getProfile(); 
    })
    .then(profile => console.log(profile)) 
    .catch(err => console.log("Error caught:", err)); 
    </script>
</body>
</html>
